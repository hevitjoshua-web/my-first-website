
<!DOCTYPE html>
<html>
<head>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            text-align: center;
        }

        header {
            background: #222;
            color: white;
            padding: 30px;
        }

        h1 {
            margin: 10px;
            animation: fadeIn 2s;
        }

        .container {
            padding: 20px;
        }

        img {
            width: 150px;
            border-radius: 50%;
            margin-top: 10px;
            border: 4px solid white;
        }

        .card {
            background: white;
            margin: 20px auto;
            padding: 20px;
            width: 80%;
            border-radius: 10px;
            box-shadow: 0 0 15px gray;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        a {
            text-decoration: none;
            color: white;
            background: #007BFF;
            padding: 10px 15px;
            border-radius: 5px;
        }

        a:hover {
            background: #0056b3;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }
    </style>

</head>
